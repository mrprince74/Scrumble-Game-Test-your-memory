<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Scrumble Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>

<body>
    <h1>Memory Scrumble Game</h1>
    <div class="rain-container" id="rain"></div>
    <h3 id="remaining_time"> </h3>
    <div class="content">
        <div class="sidebar">
            <h3 id="grid_settings">Grid Settings</h3>
            <form>
                <label for="n_rows"> Number of rows in the grid</label>
                <input type="number" id="n_rows" min="2" max="10" value="2" required>
                <label for="n_cols"> Number of columns in the grid</label>
                <input type="number" id="n_cols" min="2" max="10" value="2" required>
                <label for="time_limit"> Game Time Limit (in seconds)</label>
                <input type="number" id="time_limit" min="1" max="1000" value="10" required>

                <input type="submit" value="Create Grid">
            </form>
        </div>

        <div class="main-content">
            <div id="grid">

            </div>

        </div>
    </div>
    <div id="game-over-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); align-items:center; justify-content:center; z-index:999;">
        <div style="background:white; border-radius:12px; padding:2rem 2.5rem; text-align:center; max-width:340px; width:100%;">
            <div style="font-size:52px; margin-bottom:0.5rem;">⏰</div>
            <h2 style="margin:0 0 0.5rem;">Time's up!</h2>
            <p style="color:#666; margin:0 0 1.5rem;">You ran out of time. Better luck next time!</p>
            <button onclick="window.location.reload()" style="padding:10px 28px; border-radius:8px; border:1px solid #ccc; background:#f5f5f5; font-size:15px; cursor:pointer;">
      Play Again
    </button>
        </div>
    </div>
    <div id="win-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); align-items:center; justify-content:center; z-index:999;">
        <div style="background:white; border-radius:12px; padding:2rem 2.5rem; text-align:center; max-width:340px; width:100%;">
            <div style="font-size:52px; margin-bottom:0.5rem;">🏆</div>
            <h2 style="margin:0 0 0.5rem;">You won!</h2>
            <p style="color:#666; margin:0 0 1.5rem;">Congratulations, you matched all the cards!</p>
            <button onclick="window.location.reload()" style="padding:10px 28px; border-radius:8px; border:1px solid #ccc; background:#f5f5f5; font-size:15px; cursor:pointer;">
      Play Again
    </button>
        </div>
    </div>
</body>

</html>
